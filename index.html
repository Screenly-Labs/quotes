<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-49L9LJL3VH"></script>
    <script>

      function gtag() {
        dataLayer.push(arguments)
      }
      gtag('js', new Date())
      gtag('config', 'G-49L9LJL3VH')
    </script>
    <title>Screenly Quotes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A full-screen quotation for digital signage — one work-friendly quote, chosen at random."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='16' y='25' font-family='Georgia,serif' font-size='30' font-weight='700' text-anchor='middle' fill='%23c9a24b'%3E%E2%80%9C%3C/text%3E%3C/svg%3E"
    />
    <link
      rel="preload"
      href="/static/fonts/fraunces-latin-standard-normal.woff2?v=__ASSET_VERSION__"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/static/fonts/hanken-grotesk-latin-wght-normal.woff2?v=__ASSET_VERSION__"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/static/styles/main.css?v=__ASSET_VERSION__" />
    <script src="/static/js/main.js?v=__ASSET_VERSION__" defer></script>
  </head>
  <body>
    <main class="stage">
      <h1 class="sr-only">A quote to consider</h1>
      <figure class="quote">
        <span class="quote__mark" aria-hidden="true">&ldquo;</span>
        <blockquote class="quote__text" id="quote-text">
          The best way to predict the future is to create it.
        </blockquote>
        <figcaption class="quote__by">
          <span class="quote__rule" aria-hidden="true"></span>
          <cite class="quote__author" id="quote-author">Peter Drucker</cite>
        </figcaption>
      </figure>
      <a
        class="brand"
        href="https://www.screenly.io"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Screenly — opens in a new tab"
      >
        <img src="/static/images/screenly-logo.svg?v=__ASSET_VERSION__" alt="Screenly" />
      </a>
    </main>
  </body>
</html>
